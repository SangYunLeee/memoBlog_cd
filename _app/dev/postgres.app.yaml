apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: memo-dev-postgres
  namespace: argocd
spec:
  destination:
    namespace: memo-dev
    server: https://kubernetes.default.svc
  project: memou-dev
  source:
    helm:
      valueFiles:
      - values.yaml
    path: postgres/dev
    repoURL: https://github.com/SangYunLeee/memoBlog_cd.git
    targetRevision: HEAD

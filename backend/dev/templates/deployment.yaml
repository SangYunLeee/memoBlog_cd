apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.name }}
  replicas: {{ .Values.app.replicaCount }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
        tier: backend
    spec:
      nodeSelector:
        {{ toYaml .Values.app.nodeSelector }}
      containers:
      - image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
        imagePullPolicy: Always
        name: {{ .Values.name }}
        ports:
        - containerPort: 3001
        env:
          {{- toYaml .Values.app.env | nindent 10 }}
        resources:
          requests:
            memory: "400Mi"
            cpu: "250m"
          limits:
            memory: "500Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 10
        volumeMounts:
          {{- toYaml .Values.app.volumeMounts | nindent 10 }}
      volumes:
          {{- toYaml .Values.app.volumes | nindent 8 }}

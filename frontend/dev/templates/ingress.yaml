apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-issuer
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - {{ index .Values.ingress 0 }}
    - {{ index .Values.ingress 1 }}
    secretName: {{ index .Values.ingress 0 }}-tls
  rules:
  - host: {{ index .Values.ingress 0 }}
    http:	
      paths:	
        - backend:	
            service:	
              name: {{ .Values.name }}	
              port:	
                number: 80	
          path: /	
          pathType: Prefix
  - host: {{ index .Values.ingress 1 }}
    http:	
      paths:	
        - backend:	
            service:	
              name: {{ .Values.name }}	
              port:	
                number: 80	
          path: /	
          pathType: Prefix
